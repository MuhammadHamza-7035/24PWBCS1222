<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../styles/grid.css">
</head>

            <img src="../images/gallery/image4.png" alt="Gallery Photo 4">

        </div>

        <div class="gallery-item item-5">
            <img src="../images/gallery/image5.png" alt="Gallery Photo 5">
            <div class="overlay">Project Five</div>
        </div>

        <div class="gallery-item item-6">

</html>
