<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Data Table</title>
    <link rel="stylesheet" href="../styles/responsive.css">
</head>
<body>
    <div class="table-container">
        <h2>Student Course Grades</h2>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Course</th>
                    <th>Credits</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td data-label="Student Name">Saeed</td>
                    <td data-label="Course">Web Technologies</td>
                    <td data-label="Credits">3</td>
                    <td data-label="Grade">A</td>
                </tr>
                <tr>
                    <td data-label="Student Name">Ali</td>
                    <td data-label="Course">Database Systems</td>
                    <td data-label="Credits">4</td>
                    <td data-label="Grade">B+</td>
                </tr>
                <tr>
                    <td data-label="Student Name">Hamza</td>
                    <td data-label="Course">Software Engineering</td>
                    <td data-label="Credits">3</td>
                    <td data-label="Grade">A-</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
