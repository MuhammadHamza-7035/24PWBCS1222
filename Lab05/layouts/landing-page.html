<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile-First Landing Page</title>
    <link rel="stylesheet" href="../styles/responsive.css">
</head>
<body>
    <div class="landing-page">
        <header class="hero-section">
            <h1 class="hero-title">Master Modern Web Design</h1>
            <p class="hero-subtitle">Learn HTML, CSS Grid, Flexbox, and Responsive Layouts.</p>
            <a href="#" class="cta-button">Start Learning</a>
        </header>

        <section class="features-section">
            <div class="feature-item">
                <img src="../images/Grid.png" loading="lazy" alt="CSS Grid" class="resp-image">
                <h3>CSS Grid</h3>
                <p>Build complex two-dimensional layouts.</p>
            </div>
            <div class="feature-item">
                <img src="../images/Flexbox.png" loading="lazy" alt="Flexbox" class="resp-image">
                <h3>Flexbox</h3>
                <p>Perfect for one-dimensional alignments.</p>
            </div>
            <div class="feature-item">
                <img src="../images/MQ.png" loading="lazy" alt="Media Queries" class="resp-image">
                <h3>Media Queries</h3>
                <p>Adapt to any device size seamlessly.</p>
            </div>
        </section>
    </div>
</body>
</html>
