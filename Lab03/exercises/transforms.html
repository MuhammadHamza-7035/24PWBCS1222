<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform Gallery</title>
    <link rel="stylesheet" href="../styles/transforms.css">
</head>
<body>

    <h1>CSS Transform Gallery</h1>

    <div class="gallery-grid">
        
        <div class="transform-box box-rotate">Rotate 45&deg;</div>
        <div class="transform-box box-scale">Scale 1.2x</div>
        <div class="transform-box box-translate">Translate (X, Y)</div>

        <div class="perspective-container">
            <div class="transform-box box-3d-rotateX">3D Rotate X</div>
        </div>
        <div class="perspective-container">
            <div class="transform-box box-3d-rotateY">3D Rotate Y</div>
        </div>

        <div class="transform-box box-origin-topleft">Origin: Top Left</div>
        <div class="transform-box box-origin-bottomright">Origin: Bottom Right</div>

        <div class="transform-box box-combined">Combined Transform</div>

    </div>

</body>
</html>
