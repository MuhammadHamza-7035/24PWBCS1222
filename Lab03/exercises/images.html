<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Styling Portfolio</title>
    <link rel="stylesheet" href="../styles/images.css">
</head>
<body>

    <h1>Image Styling Portfolio</h1>

    <div class="gallery">
        
        <div class="img-container circle-img">
            <img src="../images/gallery/H1.png" alt="Circular Image">
        </div>

        <div class="img-container zoom-hover">
            <img src="../images/gallery/H2.png" alt="Zoom Hover">
        </div>

        <div class="img-container filter-grayscale">
            <img src="../images/gallery/H3.png" alt="Grayscale Filter">
        </div>

        <div class="img-container filter-blur">
            <img src="../images/gallery/H4.png" alt="Blur Filter">
        </div>

        <div class="img-container overlay-container">
            <img src="../images/gallery/H1.png" alt="Overlay Background">
            <div class="overlay-text">Hover Overlay Text</div>
        </div>

    </div>

</body>
</html>
