<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Gallery</title>
    <link rel="stylesheet" href="../styles/backgrounds.css">
</head>
<body>

    <h1>Background Gallery Showcase</h1>

    <div class="gallery-container">
        <div class="box bg-solid">Solid Color (#2c3e50)</div>
        
        <div class="box bg-repeat">Repeating Image</div>
        <div class="box bg-no-repeat">No-Repeat (Centered)</div>
        
        <div class="box bg-linear-gradient">Linear Gradient</div>
        <div class="box bg-radial-gradient">Radial Gradient</div>
        
        <div class="box bg-multiple-layers">Multiple Layers (Gradient + Image)</div>
        
        <div class="box bg-blend-mode">Blend Mode (Multiply)</div>
    </div>

</body>
</html>
