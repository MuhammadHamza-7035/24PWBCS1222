<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Styling</title>
    <link rel="stylesheet" href="../styles/form.css">
</head>
<body>

    <div class="form-container">
        <div class="success-banner">
            ✓ Registration details verified!
        </div>

        <h2>Create an Account</h2>

        <form>
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="input-error" value="123" placeholder="Create a password">
                <div class="error-message">Password must be at least 8 characters long.</div>
            </div>

            <div class="form-group">
                <label for="department">Department</label>
                <select id="department">
                    <option value="" disabled selected>Select your department</option>
                    <option value="cs">Computer Science</option>
                    <option value="ee">Electrical Engineering</option>
                    <option value="me">Mechanical Engineering</option>
                    <option value="ce">Civil Engineering</option>
                </select>
            </div>

            <button type="button" class="btn-submit">Register Now</button>
        </form>
    </div>

</body>
</html>
