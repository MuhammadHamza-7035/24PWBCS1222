<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Effects Showcase</title>
    <link rel="stylesheet" href="../styles/effects.css">
</head>
<body>

    <h1>Advanced Effects Showcase</h1>

    <div class="showcase-section">
        <h2>Gradient Text Effect</h2>
        <div class="gradient-text">Beautiful CSS Gradients</div>
    </div>

    <div class="showcase-section">
        <h2>Text Clipping with Background Image</h2>
        <div class="image-clip-text">Clipped Text</div>
    </div>

    <div class="showcase-section">
        <h2>Custom Checkboxes & Radio Buttons</h2>
        <div class="custom-controls">
            <label class="custom-checkbox-label">
                <input type="checkbox" checked>
                <span class="custom-checkbox"></span>
                Accept Terms
            </label>

            <label class="custom-radio-label">
                <input type="radio" name="options" checked>
                <span class="custom-radio"></span>
                Option A
            </label>
            <label class="custom-radio-label">
                <input type="radio" name="options">
                <span class="custom-radio"></span>
                Option B
            </label>
        </div>
    </div>

    <div class="showcase-section">
        <h2>CSS Loading Animations</h2>
        <div class="loader-container">
            <div class="spinner"></div>
            <div class="dots-loader">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <div class="showcase-section">
        <h2>Complex Shadow Effect</h2>
        <div class="complex-shadow-box">Layered Shadow</div>
    </div>

</body>
</html>
