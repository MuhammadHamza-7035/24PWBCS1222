<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Styling Collection</title>
    <link rel="stylesheet" href="../styles/buttons.css">
</head>
<body>

    <h1>Button Styling Collection</h1>

    <div class="button-group">
        <h2>Sizes & Shapes</h2>
        <button class="btn btn-primary btn-sm btn-square">Small Square</button>
        <button class="btn btn-primary btn-md btn-rounded">Medium Rounded</button>
        <button class="btn btn-primary btn-lg btn-pill">Large Pill</button>
    </div>

    <div class="button-group">
        <h2>Gradients & Custom Shadows</h2>
        <button class="btn btn-gradient btn-md btn-pill">Gradient Glow</button>
        <button class="btn btn-dark btn-md btn-square">Hard Shadow</button>
    </div>

    <div class="button-group">
        <h2>Focus & Disabled States</h2>
        <button class="btn btn-primary btn-md btn-rounded">Click then press Tab</button>
        <button class="btn btn-gradient btn-md btn-pill">Focus Target</button>
        <button class="btn btn-md btn-rounded" disabled>Disabled State</button>
    </div>

</body>
</html>
